<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volatility Models - Fixed Income Model Zoo</title>
    <meta http-equiv="refresh" content="3;url=../app_fi_zoo/#volatility">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0d1117;
            color: #e6edf3;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: rgba(248, 81, 73, 0.12);
            border: 2px solid rgba(248, 81, 73, 0.3);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #f85149, #ff7b72);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #8b949e;
            font-size: 15px;
            margin-bottom: 32px;
        }

        .progress-track {
            width: 200px;
            height: 3px;
            background: #21262d;
            border-radius: 3px;
            margin: 0 auto 16px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #f85149, #ff7b72);
            border-radius: 3px;
            animation: load 2.5s ease-in-out forwards;
        }

        @keyframes load {
            0%   { width: 0%; }
            60%  { width: 70%; }
            100% { width: 100%; }
        }

        .redirect-text {
            color: #6e7681;
            font-size: 13px;
        }

        .redirect-text a {
            color: #f85149;
            text-decoration: none;
        }

        .redirect-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">
            <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
                <path d="M4 28 Q10 28 13 20 Q16 12 18 18 Q20 24 22 14 Q24 4 26 10 Q28 16 30 8 L32 8"
                      stroke="#f85149" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="18" cy="18" r="2" fill="#ff7b72" opacity="0.6"/>
            </svg>
        </div>
        <h1>Volatility Models</h1>
        <p class="subtitle">Fixed Income Model Zoo</p>
        <div class="progress-track">
            <div class="progress-bar"></div>
        </div>
        <p class="redirect-text">
            Redirecting to the <a href="../app_fi_zoo/#volatility">Model Zoo</a>&hellip;
        </p>
    </div>

    <script>
        setTimeout(function() {
            window.location.href = '../app_fi_zoo/#volatility';
        }, 3000);
    </script>
</body>
</html>
